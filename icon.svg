<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Robot face -->
  <!-- Head -->
  <rect x="156" y="195" width="200" height="160" rx="35" fill="white"/>

  <!-- Eyes -->
  <circle cx="220" cy="260" r="25" fill="#667eea"/>
  <circle cx="320" cy="260" r="25" fill="#667eea"/>
  <!-- Eye shine -->
  <circle cx="228" cy="252" r="8" fill="white"/>
  <circle cx="328" cy="252" r="8" fill="white"/>

  <!-- Smile -->
  <path d="M 220 310 Q 270 350 320 310" stroke="#667eea" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Antenna -->
  <line x1="256" y1="195" x2="256" y2="148" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <circle cx="256" cy="140" r="15" fill="#ffd700"/>

  <!-- Ears -->
  <rect x="128" y="240" width="28" height="45" rx="10" fill="white"/>
  <rect x="356" y="240" width="28" height="45" rx="10" fill="white"/>

  <!-- Math symbols -->
  <text x="105" y="175" font-family="Arial, sans-serif" font-size="48" fill="rgba(255,255,255,0.7)" font-weight="bold">+</text>
  <text x="390" y="190" font-family="Arial, sans-serif" font-size="42" fill="rgba(255,255,255,0.6)" font-weight="bold">×</text>
  <text x="95" y="370" font-family="Arial, sans-serif" font-size="40" fill="rgba(255,255,255,0.5)" font-weight="bold">÷</text>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="44" fill="rgba(255,255,255,0.55)" font-weight="bold">=</text>

  <!-- App name below robot -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="56" fill="white" font-weight="bold" text-anchor="middle">Репетик</text>
</svg>
