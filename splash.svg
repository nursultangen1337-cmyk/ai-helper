<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="300" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="930" cy="1600" r="250" fill="rgba(255,255,255,0.05)"/>
  <circle cx="800" cy="400" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="200" cy="1400" r="160" fill="rgba(255,255,255,0.04)"/>

  <!-- Main icon circle -->
  <circle cx="540" cy="750" r="180" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>

  <!-- Robot face -->
  <rect x="460" y="680" width="160" height="130" rx="25" fill="white"/>
  <circle cx="500" cy="730" r="18" fill="#667eea"/>
  <circle cx="580" cy="730" r="18" fill="#667eea"/>
  <circle cx="506" cy="724" r="6" fill="white"/>
  <circle cx="586" cy="724" r="6" fill="white"/>
  <path d="M 500 770 Q 540 800 580 770" stroke="#667eea" stroke-width="5" fill="none" stroke-linecap="round"/>
  <line x1="540" y1="680" x2="540" y2="645" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <circle cx="540" cy="638" r="10" fill="#ffd700"/>
  <rect x="438" y="715" width="22" height="35" rx="8" fill="white"/>
  <rect x="620" y="715" width="22" height="35" rx="8" fill="white"/>

  <!-- Book icon (top-right) -->
  <g transform="translate(690, 640)" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 5 Q15 0 30 5 L30 40 Q15 35 0 40 Z"/>
    <path d="M30 5 Q45 0 60 5 L60 40 Q45 35 30 40 Z"/>
  </g>

  <!-- Pencil icon (bottom-right) -->
  <g transform="translate(700, 830)" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="45" x2="35" y2="0"/>
    <line x1="35" y1="0" x2="45" y2="10"/>
    <line x1="45" y1="10" x2="10" y2="55"/>
    <line x1="10" y1="55" x2="0" y2="45"/>
    <line x1="0" y1="45" x2="-5" y2="60"/>
    <line x1="-5" y1="60" x2="10" y2="55"/>
  </g>

  <!-- Globe icon (bottom-left) -->
  <g transform="translate(355, 820)">
    <circle cx="25" cy="25" r="25" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
    <ellipse cx="25" cy="25" rx="12" ry="25" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
    <line x1="0" y1="25" x2="50" y2="25" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
    <path d="M 5 13 Q 25 18 45 13" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <path d="M 5 37 Q 25 32 45 37" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  </g>

  <!-- Ruler/triangle icon (top-left) -->
  <g transform="translate(365, 630)" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="0,50 50,50 0,0"/>
    <line x1="0" y1="38" x2="12" y2="38"/>
    <line x1="0" y1="26" x2="12" y2="26"/>
    <line x1="0" y1="14" x2="8" y2="14"/>
  </g>

  <!-- Math plus sign (far left) -->
  <g transform="translate(385, 890)" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round">
    <line x1="0" y1="15" x2="30" y2="15"/>
    <line x1="15" y1="0" x2="15" y2="30"/>
  </g>

  <!-- Palette/art circle (far right) -->
  <g transform="translate(680, 620)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
    <circle cx="12" cy="11" r="3.5" fill="rgba(255,200,100,0.7)"/>
    <circle cx="24" cy="12" r="3.5" fill="rgba(100,200,255,0.7)"/>
    <circle cx="10" cy="22" r="3.5" fill="rgba(255,130,130,0.7)"/>
    <circle cx="22" cy="24" r="3.5" fill="rgba(130,255,130,0.7)"/>
  </g>

  <!-- App name -->
  <text x="540" y="1060" font-family="Arial, sans-serif" font-size="96" fill="white" font-weight="bold" text-anchor="middle">Репетик</text>

  <!-- Subtitle -->
  <text x="540" y="1130" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.8)" text-anchor="middle">AI-репетитор для 3 класу</text>

  <!-- Tagline -->
  <text x="540" y="1190" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.55)" text-anchor="middle">Вчимося разом — крок за кроком!</text>

  <!-- Bottom loading dots -->
  <circle cx="500" cy="1700" r="10" fill="rgba(255,255,255,0.8)"/>
  <circle cx="540" cy="1700" r="10" fill="rgba(255,255,255,0.5)"/>
  <circle cx="580" cy="1700" r="10" fill="rgba(255,255,255,0.3)"/>
</svg>
